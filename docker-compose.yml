services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uaifestas
      POSTGRES_PASSWORD: uaifestas
      POSTGRES_DB: uaifestas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U uaifestas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://uaifestas:uaifestas@db:5432/uaifestas
      SECRET_KEY: dev-secret-key-troque-em-producao
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      ALGORITHM: HS256
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
